services:
  codexchat_db:
    container_name: codexchat_db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codexchat}
      POSTGRES_USER: ${POSTGRES_USER:-codexchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codexchat}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codexchat} -d ${POSTGRES_DB:-codexchat}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - codexchat_db_data:/var/lib/postgresql/data
    networks:
      - codexchat_internal

  codexchat_back:
    container_name: codexchat_back
    build:
      context: ./codexchat_back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      codexchat_db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://codexchat:codexchat@codexchat_db:5432/codexchat}
      REDIS_URL: ${REDIS_URL:-}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      SESSION_SECRET: ${SESSION_SECRET:-replace_with_long_random_secret_at_least_32_chars}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-codexchat_session}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-codexchat_csrf}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      ENABLE_PUBLIC_REGISTRATION: ${ENABLE_PUBLIC_REGISTRATION:-false}
      CODEX_TURN_TIMEOUT_SECONDS: ${CODEX_TURN_TIMEOUT_SECONDS:-300}
      HEARTBEAT_POLL_INTERVAL_SECONDS: ${HEARTBEAT_POLL_INTERVAL_SECONDS:-15}
      HEARTBEAT_CLAIM_BATCH_SIZE: ${HEARTBEAT_CLAIM_BATCH_SIZE:-5}
      HEARTBEAT_MIN_INTERVAL_MINUTES: ${HEARTBEAT_MIN_INTERVAL_MINUTES:-5}
      HEARTBEAT_INTERVAL_PRESETS: ${HEARTBEAT_INTERVAL_PRESETS:-[5,15,30,60]}
      HEARTBEAT_RUN_STALE_AFTER_SECONDS: ${HEARTBEAT_RUN_STALE_AFTER_SECONDS:-900}
      HEARTBEAT_ALLOWED_BASE_PATH: ${HEARTBEAT_ALLOWED_BASE_PATH:-}
      UPLOADS_PATH: ${UPLOADS_PATH:-/app/uploads}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_PASSWORD_HASH: ${ADMIN_BOOTSTRAP_PASSWORD_HASH:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    networks:
      - n8n_default
      - codexchat_internal
    volumes:
      - codexchat_uploads_data:/app/uploads
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.codexchat-back.entrypoints=web,websecure
      - traefik.http.routers.codexchat-back.rule=(Host(`questflow.net`) || Host(`www.questflow.net`) || Host(`todo.flounderboard.com`)) && (PathPrefix(`/api`) || PathPrefix(`/ws`))
      - traefik.http.routers.codexchat-back.priority=300
      - traefik.http.routers.codexchat-back.tls=true
      - traefik.http.routers.codexchat-back.tls.certresolver=mytlschallenge
      - traefik.http.services.codexchat-back.loadbalancer.server.port=8000

  codexchat_worker:
    container_name: codexchat_worker
    build:
      context: ./codexchat_back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      codexchat_db:
        condition: service_healthy
    command: ["uvicorn", "app.worker.main:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://codexchat:codexchat@codexchat_db:5432/codexchat}
      REDIS_URL: ${REDIS_URL:-}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      SESSION_SECRET: ${SESSION_SECRET:-replace_with_long_random_secret_at_least_32_chars}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-codexchat_session}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-codexchat_csrf}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      ENABLE_PUBLIC_REGISTRATION: ${ENABLE_PUBLIC_REGISTRATION:-false}
      CODEX_TURN_TIMEOUT_SECONDS: ${CODEX_TURN_TIMEOUT_SECONDS:-300}
      HEARTBEAT_POLL_INTERVAL_SECONDS: ${HEARTBEAT_POLL_INTERVAL_SECONDS:-15}
      HEARTBEAT_CLAIM_BATCH_SIZE: ${HEARTBEAT_CLAIM_BATCH_SIZE:-5}
      HEARTBEAT_MIN_INTERVAL_MINUTES: ${HEARTBEAT_MIN_INTERVAL_MINUTES:-5}
      HEARTBEAT_INTERVAL_PRESETS: ${HEARTBEAT_INTERVAL_PRESETS:-[5,15,30,60]}
      HEARTBEAT_RUN_STALE_AFTER_SECONDS: ${HEARTBEAT_RUN_STALE_AFTER_SECONDS:-900}
      HEARTBEAT_ALLOWED_BASE_PATH: ${HEARTBEAT_ALLOWED_BASE_PATH:-}
      UPLOADS_PATH: ${UPLOADS_PATH:-/app/uploads}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_PASSWORD_HASH: ${ADMIN_BOOTSTRAP_PASSWORD_HASH:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    networks:
      - codexchat_internal
    volumes:
      - codexchat_uploads_data:/app/uploads

  codexchat_front:
    container_name: codexchat_front
    build:
      context: ./codexchat_front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_ORIGIN: https://${APP_DOMAIN}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - traefik.enable=true
      - traefik.docker.network=n8n_default
      - traefik.http.routers.codexchat-front.entrypoints=web,websecure
      - traefik.http.routers.codexchat-front.rule=Host(`questflow.net`) || Host(`www.questflow.net`) || Host(`todo.flounderboard.com`)
      - traefik.http.routers.codexchat-front.priority=200
      - traefik.http.routers.codexchat-front.tls=true
      - traefik.http.routers.codexchat-front.tls.certresolver=mytlschallenge
      - traefik.http.services.codexchat-front.loadbalancer.server.port=3000

networks:
  n8n_default:
    external: true
  codexchat_internal:

volumes:
  codexchat_db_data:
  codexchat_uploads_data:
